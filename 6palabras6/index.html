<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PALABROS - El Juego de Dados Táctil</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --primary: #f59e0b; --text-color: #f8fafc;
            --rojo: #ef4444; --azul: #3b82f6; --verde: #10b981; --morado: #a855f7; --blanco: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; touch-action: manipulation; }
        
        /* Forzamos el body a ocupar el 100% de la altura visual sin scroll */
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; height: calc(var(--vh, 1vh) * 100); overflow: hidden; position: fixed; width: 100%; }
        
        /* HEADER FIJO */
        header { width: 100%; padding: 10px; text-align: center; background: #1e293b; border-bottom: 3px solid var(--primary); z-index: 10; flex-shrink: 0; }
        h1 { font-weight: 900; letter-spacing: 4px; font-size: 1.5rem; color: var(--primary); text-transform: uppercase; }

        /* PANEL CONFIG (Scroll interno) */
        #config-panel { position: fixed; top: 0; right: -330px; width: 320px; height: 100%; background: var(--card-bg); z-index: 1000; padding: 20px; transition: 0.3s; overflow-y: auto; box-shadow: -10px 0 20px rgba(0,0,0,0.5); }
        #config-panel.open { right: 0; }
        .config-btn { position: fixed; top: 10px; right: 10px; z-index: 1001; background: #1e293b; border: 1px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; font-size: 18px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.8; }
        
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 9px; color: var(--primary); margin-bottom: 2px; text-transform: uppercase; font-weight: 700; }
        input, select { width: 100%; padding: 8px; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 8px; font-size: 0.9rem; }
        hr { border: 0; border-top: 1px solid #334155; margin: 15px 0; }

        /* STATS FIJAS */
        .stats { display: flex; justify-content: space-around; width: 100%; background: var(--card-bg); padding: 8px; border-bottom: 1px solid #334155; flex-shrink: 0; z-index: 5; }
        .stat-box { text-align: center; }
        .stat-val { font-weight: 900; font-size: 1.1rem; display: block; color: var(--blanco); }
        .stat-lbl { font-size: 8px; color: #94a3b8; text-transform: uppercase; }

        /* AREA DE JUEGO PRINCIPAL CON FLEX */
        #game-area { flex-grow: 1; width: 100%; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; padding: 10px; overflow: hidden; position: relative; }
        
        /* PALABRA FIJA ARRIBA */
        #display-word-container { width: 100%; flex-shrink: 0; margin-bottom: 10px; z-index: 5; }
        #display-word {
            min-height: 55px; width: 100%; background: #020617; border: 2px solid #334155;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900; color: var(--blanco); letter-spacing: 2px; text-transform: uppercase;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        /* AREA DE DADOS CON SCROLL INTERNO (Se lleva el espacio restante) */
        #dice-scroll-area { flex-grow: 1; width: 100%; overflow-y: auto; padding: 5px; border-radius: 12px; background: rgba(0,0,0,0.1); -webkit-overflow-scrolling: touch; }
        .dice-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; padding-bottom: 10px; }
        
        @keyframes shake {
            0% { transform: rotate(0deg); } 25% { transform: rotate(2deg); } 50% { transform: rotate(-2deg); } 75% { transform: rotate(2deg); } 100% { transform: rotate(0deg); }
        }
        .shaking { animation: shake 0.3s ease-in-out; }

        .die {
            aspect-ratio: 1/1; border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: 900; position: relative; box-shadow: 0 5px 0 rgba(0,0,0,0.4);
            cursor: pointer; user-select: none; transition: transform 0.1s;
        }
        .die:active { transform: scale(0.95) translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
        .die.comodin { color: #ff0000; text-shadow: 0 0 5px rgba(255,0,0,0.2); }
        .die .val { position: absolute; bottom: 4px; right: 8px; font-size: 0.7rem; font-weight: 700; opacity: 0.7; }

        /* CONTROLES FIJOS ABAJO (Flex-shrink: 0 para que nunca se oculten) */
        .controls-container { width: 100%; flex-shrink: 0; padding-top: 10px; background: var(--bg-color); z-index: 5; margin-top: auto; border-top: 1px solid #1e293b; }
        .controls { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; width: 100%; padding-bottom: 10px; }
        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 0.9rem; transition: 0.1s; }
        .btn-del { background: #334155; color: white; border: 1px solid #475569; }
        .btn-main { background: var(--primary); color: #000; box-shadow: 0 4px 0 #b45309; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 1px 0 #b45309; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

        /* SELECTOR DE LETRA (Mejorado para móvil táctil) */
        #star-selector {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.96);
            z-index: 2000; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px;
            align-content: center; justify-items: center; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .star-letter { background: var(--blanco); color: #0f172a; aspect-ratio: 1/1; width: 100%; max-width: 60px; display: flex; align-items: center; justify-content: center; font-weight: 900; border-radius: 10px; font-size: 1.5rem; transition: 0.1s; box-shadow: 0 4px 0 rgba(255,255,255,0.3); }
        .star-letter:active { background: var(--primary); transform: translateY(3px); box-shadow: none; }

        #msg { padding: 8px; text-align: center; border-radius: 10px; width: 100%; display: none; font-weight: 700; font-size: 0.8rem; margin-bottom: 5px; flex-shrink: 0; }
        .success { background: #10b981; color: white; display: block !important; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* COLORES DADOS */
        .c-rojo { background: var(--rojo); color: white; }
        .c-azul { background: var(--azul); color: white; }
        .c-verde { background: var(--verde); color: white; }
        .c-morado { background: var(--morado); color: white; }
        .c-blanco { background: var(--blanco); color: #1e293b; }
    </style>
</head>
<body>

<button class="config-btn" onclick="document.getElementById('config-panel').classList.toggle('open')">⚙️</button>

<div id="config-panel">
    <h2 style="color:var(--primary); margin-bottom:15px; text-align:center">AJUSTES "PALABROS"</h2>
    
    <div class="input-group">
        <label>Dados por Tirada (N)</label>
        <input type="number" id="cfg-n-dice" value="6" min="1" max="11">
    </div>
    
    <hr>
    <p style="font-size:10px; color:var(--blanco); margin-bottom:10px; font-weight:700">PUNTOS BONOS</p>
    <div class="input-group"><label>Bono Velocidad (1º Puesto)</label><input type="number" id="pts-v1" value="10"></div>
    <div class="input-group"><label>Bono Palabrón (10+ letras)</label><input type="number" id="pts-pab" value="10"></div>
    <div class="input-group"><label>Bono Sextuplete (Usar los N dados)</label><input type="number" id="pts-sex" value="20"></div>

    <hr>
    <p style="font-size:10px; color:var(--blanco); margin-bottom:10px; font-weight:700">PUNTOS POR LETRA/COLOR</p>
    <div class="input-group"><label>🔴 Rojo (A,E,O,R,S)</label><input type="number" id="p-rojo" value="1"></div>
    <div class="input-group"><label>🔵 Azul (I,L,D,N,T)</label><input type="number" id="p-azul" value="2"></div>
    <div class="input-group"><label>🟢 Verde (C,B,M,P)</label><input type="number" id="p-verde" value="3"></div>
    <div class="input-group"><label>🟣 Morado (Difíciles/U)</label><input type="number" id="p-mora" value="5"></div>

    <button class="btn btn-main" style="width:100%; margin-top:20px" onclick="document.getElementById('config-panel').classList.remove('open')">GUARDAR Y CERRAR</button>
</div>

<header><h1>PALABROS</h1></header>

<div class="stats">
    <div class="stat-box"><span class="stat-lbl">Ronda</span><span id="ui-round" class="stat-val">1/6</span></div>
    <div class="stat-box"><span class="stat-lbl">Puntos</span><span id="ui-score" class="stat-val">0</span></div>
    <div class="stat-box"><span class="stat-lbl">Reloj</span><span id="ui-timer" class="stat-val">0s</span></div>
</div>

<main id="game-area">
    <div id="display-word-container">
        <div id="display-word"></div>
    </div>
    <div id="msg"></div>
    
    <div id="dice-scroll-area">
        <div id="dice-container" class="dice-grid"></div>
    </div>
    
    <div class="controls-container">
        <div class="controls">
            <button class="btn btn-del" onclick="deleteLast()">Borrar</button>
            <button id="btn-play" class="btn btn-main" onclick="handleAction()">Lanzar Dados</button>
        </div>
    </div>
</main>

<div id="star-selector"></div>

<script>
    // Solución para la altura visual correcta en móviles (evitar barra de direcciones)
    const setVh = () => {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    };
    window.addEventListener('resize', setVh);
    window.addEventListener('orientationchange', setVh);
    setVh();

    const DADOS_MODEL = [
        {c:['A','E','O','R','S','★']}, {c:['A','E','O','R','S','★']}, {c:['A','E','O','R','S','★']},
        {c:['A','E','O','L','D','★']}, {c:['A','E','O','L','D','★']}, {c:['A','E','I','N','T','★']},
        {c:['I','N','T','C','B','★']}, {c:['I','N','T','C','B','★']}, {c:['I','L','D','C','M','★']},
        {c:['U','P','M','F','G','★']}, {c:['U','P','H','J','Ñ','★']}, {c:['U','U','V','Q','Z','★']}
    ];

    let state = {
        score: 0, round: 1, phase: 1, bolsa: [], usadosAnterior: [], activeDiceData: [], wordStack: [], startTime: 0, timer: null
    };

    function getLetterInfo(l) {
        if (l === '★') return { color: 'blanco', pts: 0 };
        if ("AEORS".includes(l)) return { color: 'rojo', pts: parseInt(document.getElementById('p-rojo').value) };
        if ("ILNDT".includes(l)) return { color: 'azul', pts: parseInt(document.getElementById('p-azul').value) };
        if ("CBMP".includes(l)) return { color: 'verde', pts: parseInt(document.getElementById('p-verde').value) };
        if ("UFGHJÑVQZU".includes(l)) return { color: 'morado', pts: parseInt(document.getElementById('p-mora').value) };
        return { color: 'blanco', pts: 0 };
    }

    function handleAction() {
        const btn = document.getElementById('btn-play');
        if (btn.innerText.includes("LANZAR") || btn.innerText.includes("RONDA") || btn.innerText.includes("NUEVA")) startRound();
        else validateWord();
    }

    function startRound() {
        const N = parseInt(document.getElementById('cfg-n-dice').value);
        const container = document.getElementById('dice-container');
        container.innerHTML = "";
        
        const scrollArea = document.getElementById('dice-scroll-area');
        scrollArea.classList.add('shaking');
        setTimeout(() => scrollArea.classList.remove('shaking'), 300);
        
        document.getElementById('display-word').innerText = "";
        document.getElementById('msg').style.display = "none";
        state.wordStack = [];

        let elegidos = [];
        if (state.phase === 1) {
            let mezclada = [...DADOS_MODEL].sort(() => Math.random() - 0.5);
            elegidos = mezclada.slice(0, N);
            state.bolsa = mezclada.slice(N);
            state.usadosAnterior = elegidos;
        } else {
            elegidos = [...state.bolsa];
            if (elegidos.length < N) {
                const faltan = N - elegidos.length;
                const relleno = [...state.usadosAnterior].sort(() => Math.random() - 0.5).slice(0, faltan);
                elegidos = elegidos.concat(relleno);
            }
        }

        state.activeDiceData = elegidos.map((d, index) => {
            const letra = d.c[Math.floor(Math.random() * 6)];
            const info = getLetterInfo(letra);
            const div = document.createElement('div');
            div.className = `die c-${info.color} ${letra === '★' ? 'comodin' : ''}`;
            div.id = `die-${index}`;
            div.innerHTML = `${letra} <span class="val">${info.pts > 0 ? info.pts : ''}</span>`;
            div.onclick = () => selectDie(index);
            container.appendChild(div);
            return { original: letra, pts: info.pts };
        });

        state.startTime = Date.now();
        clearInterval(state.timer);
        state.timer = setInterval(() => {
            document.getElementById('ui-timer').innerText = Math.floor((Date.now() - state.startTime) / 1000) + "s";
        }, 1000);
        document.getElementById('btn-play').innerText = "¡LISTO!";
    }

    function selectDie(idx) {
        if (state.activeDiceData[idx].original === '★') {
            showStarSelector(idx);
        } else {
            addLetter(idx, state.activeDiceData[idx].original);
        }
    }

    function showStarSelector(idx) {
        const selector = document.getElementById('star-selector');
        selector.innerHTML = "";
        selector.style.display = "grid";
        // Letras comunes en español ordenadas alfabéticamente
        "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split('').forEach(l => {
            const b = document.createElement('div');
            b.className = "star-letter";
            b.innerText = l;
            // Usamos touchend para mayor rapidez en móvil si es posible
            b.onclick = (e) => { 
                e.preventDefault();
                selector.style.display = "none"; 
                addLetter(idx, l); 
            };
            selector.appendChild(b);
        });
    }

    function addLetter(diceIdx, letraElegida) {
        state.wordStack.push({ diceIdx, letraElegida });
        updateDisplay();
    }

    function deleteLast() {
        if (state.wordStack.length === 0) return;
        state.wordStack.pop();
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('display-word').innerText = state.wordStack.map(s => s.letraElegida).join('');
    }

    function validateWord() {
        if (state.wordStack.length < 2) return;
        clearInterval(state.timer);
        const time = Math.floor((Date.now() - state.startTime) / 1000);
        
        const ptsV1 = parseInt(document.getElementById('pts-v1').value);
        let pVel = (time < 10) ? ptsV1 : (time < 15 ? 5 : (time < 20 ? 2 : 0));
        
        let pLetras = state.wordStack.reduce((sum, item) => sum + state.activeDiceData[item.diceIdx].pts, 0);
        
        const distinctDiceUsed = new Set(state.wordStack.map(item => item.diceIdx)).size;
        const N = parseInt(document.getElementById('cfg-n-dice').value);
        const ptsSex = parseInt(document.getElementById('pts-sex').value);
        let pSex = (distinctDiceUsed === N) ? ptsSex : 0;
        
        const ptsPab = parseInt(document.getElementById('pts-pab').value);
        let pPab = (state.wordStack.length >= 10) ? ptsPab : 0;

        const total = pVel + pLetras + pSex + pPab;
        state.score += total;

        const msg = document.getElementById('msg');
        msg.innerHTML = `🔥 +${total} PUNTOS <br><small>Letras: ${pLetras} | Tiempo: ${pVel} ${pSex ? '| SEXTUPLETE!' : ''}${pPab ? ' | PALABRÓN!' : ''}</small>`;
        msg.className = "success";
        
        document.getElementById('ui-score').innerText = state.score;
        const btn = document.getElementById('btn-play');

        if (state.phase === 1) {
            state.phase = 2;
            btn.innerText = "SIGUIENTE RONDA (SOBRANTES)";
        } else {
            state.phase = 1;
            state.round++;
            btn.innerText = (state.round > 6) ? "FIN DE PARTIDA" : "NUEVA PALABRA (BOLSA)";
            if (state.round > 6) btn.disabled = true;
        }
        document.getElementById('ui-round').innerText = (state.round > 6 ? 6 : state.round) + "/6";
    }
</script>
</body>
</html>
