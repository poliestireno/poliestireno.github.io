<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PALABROS V5 - El Juego Definitivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --primary: #f59e0b; --text-color: #f8fafc;
            --rojo: #ef4444; --azul: #3b82f6; --verde: #10b981; --morado: #a855f7; --blanco: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; touch-action: manipulation; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; height: calc(var(--vh, 1vh) * 100); overflow: hidden; position: fixed; width: 100%; }
        
        header { width: 100%; padding: 10px; text-align: center; background: #1e293b; border-bottom: 3px solid var(--primary); z-index: 10; flex-shrink: 0; }
        h1 { font-weight: 900; letter-spacing: 4px; font-size: 1.5rem; color: var(--primary); text-transform: uppercase; }

        #config-panel { position: fixed; top: 0; right: -330px; width: 320px; height: 100%; background: var(--card-bg); z-index: 1000; padding: 20px; transition: 0.3s; overflow-y: auto; box-shadow: -10px 0 20px rgba(0,0,0,0.5); }
        #config-panel.open { right: 0; }
        .config-btn { position: fixed; top: 10px; right: 10px; z-index: 1001; background: #1e293b; border: 1px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; font-size: 18px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .input-group { margin-bottom: 8px; }
        label { display: block; font-size: 9px; color: var(--primary); margin-bottom: 2px; text-transform: uppercase; font-weight: 700; }
        input { width: 100%; padding: 6px; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 6px; font-size: 0.85rem; }
        hr { border: 0; border-top: 1px solid #334155; margin: 12px 0; }
        h3 { font-size: 11px; margin-bottom: 8px; color: var(--blanco); text-transform: uppercase; }

        .stats { display: flex; justify-content: space-around; width: 100%; background: var(--card-bg); padding: 8px; border-bottom: 1px solid #334155; flex-shrink: 0; }
        .stat-val { font-weight: 900; font-size: 1.1rem; display: block; color: var(--blanco); }
        .stat-lbl { font-size: 8px; color: #94a3b8; text-transform: uppercase; }

        #game-area { flex-grow: 1; width: 100%; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; padding: 10px; overflow: hidden; }
        #display-word { min-height: 55px; width: 100%; background: #020617; border: 2px solid #334155; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; color: var(--blanco); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }

        #dice-scroll-area { flex-grow: 1; width: 100%; overflow-y: auto; padding: 5px; border-radius: 12px; background: rgba(0,0,0,0.1); }
        .dice-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; padding-bottom: 15px; }
        
        .die { aspect-ratio: 1/1; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; position: relative; box-shadow: 0 5px 0 rgba(0,0,0,0.4); cursor: pointer; user-select: none; transition: 0.1s; }
        .die:active { transform: scale(0.95) translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
        .die.comodin-fijado { color: #ffffff !important; background: #e11d48 !important; box-shadow: 0 5px 0 #9f1239; }
        .die .val { position: absolute; bottom: 4px; right: 8px; font-size: 0.7rem; font-weight: 700; opacity: 0.8; }

        .controls-container { width: 100%; flex-shrink: 0; padding: 10px 0; background: var(--bg-color); }
        .controls { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; width: 100%; }
        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 0.9rem; }
        .btn-del { background: #334155; color: white; }
        .btn-main { background: var(--primary); color: #000; box-shadow: 0 4px 0 #b45309; }

        #star-selector { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.98); z-index: 2000; display: none; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; align-content: center; }
        .star-letter { background: var(--blanco); color: #0f172a; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-weight: 900; border-radius: 10px; font-size: 1.4rem; }

        #msg { padding: 10px; text-align: center; border-radius: 10px; width: 100%; display: none; font-weight: 700; font-size: 0.8rem; margin-bottom: 5px; background: #10b981; color: white; }

        .c-rojo { background: var(--rojo); color: white; }
        .c-azul { background: var(--azul); color: white; }
        .c-verde { background: var(--verde); color: white; }
        .c-morado { background: var(--morado); color: white; }
        .c-blanco { background: var(--blanco); color: #1e293b; }
    </style>
</head>
<body>

<button class="config-btn" onclick="document.getElementById('config-panel').classList.toggle('open')">⚙️</button>

<div id="config-panel">
    <h2 style="color:var(--primary); margin-bottom:15px; text-align:center">AJUSTES</h2>
    
    <div class="input-group"><label>Dados por Tirada (N)</label><input type="number" id="cfg-n-dice" value="6"></div>
    
    <hr>
    <h3>Bonos Especiales</h3>
    <div class="input-group"><label>Sextuplete (Usar todos)</label><input type="number" id="pts-sex" value="20"></div>
    <div class="input-group"><label>Palabrón (10+ letras)</label><input type="number" id="pts-pab" value="10"></div>
    
    <hr>
    <h3>Puntos Letra/Color</h3>
    <div class="input-group"><label>🔴 Rojo (A,E,O,R,S)</label><input type="number" id="p-rojo" value="1"></div>
    <div class="input-group"><label>🔵 Azul (I,L,D,N,T)</label><input type="number" id="p-azul" value="2"></div>
    <div class="input-group"><label>🟢 Verde (C,B,M,P)</label><input type="number" id="p-verde" value="3"></div>
    <div class="input-group"><label>🟣 Morado (Difíciles)</label><input type="number" id="p-mora" value="5"></div>

    <hr>
    <h3>Premios Velocidad</h3>
    <div class="input-group"><label>< 10s</label><input type="number" id="v-10" value="10"></div>
    <div class="input-group"><label>< 15s</label><input type="number" id="v-15" value="5"></div>
    <div class="input-group"><label>< 20s</label><input type="number" id="v-20" value="3"></div>
    <div class="input-group"><label>< 30s</label><input type="number" id="v-30" value="1"></div>

    <button class="btn btn-main" style="width:100%; margin-top:10px" onclick="document.getElementById('config-panel').classList.remove('open')">GUARDAR</button>
</div>

<header><h1>PALABROS</h1></header>

<div class="stats">
    <div class="stat-box"><span class="stat-lbl">Ronda</span><span id="ui-round" class="stat-val">1/6</span></div>
    <div class="stat-box"><span class="stat-lbl">Puntos</span><span id="ui-score" class="stat-val">0</span></div>
    <div class="stat-box"><span class="stat-lbl">Reloj</span><span id="ui-timer" class="stat-val">0s</span></div>
</div>

<main id="game-area">
    <div id="display-word"></div>
    <div id="msg"></div>
    <div id="dice-scroll-area">
        <div id="dice-container" class="dice-grid"></div>
    </div>
    <div class="controls-container">
        <div class="controls">
            <button class="btn btn-del" onclick="deleteLast()">Borrar</button>
            <button id="btn-play" class="btn btn-main" onclick="handleAction()">Lanzar Dados</button>
        </div>
    </div>
</main>

<div id="star-selector"></div>

<script>
    const setVh = () => { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); };
    window.onresize = setVh; setVh();

    const DADOS_MODEL = [
        {c:['A','E','O','R','S','★']}, {c:['A','E','O','R','S','★']}, {c:['A','E','O','R','S','★']},
        {c:['A','E','O','L','D','★']}, {c:['A','E','O','L','D','★']}, {c:['A','E','I','N','T','★']},
        {c:['I','N','T','C','B','★']}, {c:['I','N','T','C','B','★']}, {c:['I','L','D','C','M','★']},
        {c:['U','P','M','F','G','★']}, {c:['U','P','H','J','Ñ','★']}, {c:['U','U','V','Q','Z','★']}
    ];

    let state = { score: 0, round: 1, activeDiceData: [], wordStack: [], startTime: 0, timer: null };

    function getLetterInfo(l) {
        if (l === '★') return { color: 'blanco', pts: 0 };
        if ("AEORS".includes(l)) return { color: 'rojo', pts: parseInt(document.getElementById('p-rojo').value) };
        if ("ILNDT".includes(l)) return { color: 'azul', pts: parseInt(document.getElementById('p-azul').value) };
        if ("CBMP".includes(l)) return { color: 'verde', pts: parseInt(document.getElementById('p-verde').value) };
        if ("UFGHJÑVQZU".includes(l)) return { color: 'morado', pts: parseInt(document.getElementById('p-mora').value) };
        return { color: 'blanco', pts: 0 };
    }

    function handleAction() {
        const btn = document.getElementById('btn-play');
        if (btn.innerText.includes("LANZAR") || btn.innerText.includes("RONDA") || btn.innerText.includes("NUEVA")) startRound();
        else validateWord();
    }

    function startRound() {
        const N = parseInt(document.getElementById('cfg-n-dice').value);
        const container = document.getElementById('dice-container');
        container.innerHTML = "";
        document.getElementById('display-word').innerText = "";
        document.getElementById('msg').style.display = "none";
        state.wordStack = [];

        let elegidos = [...DADOS_MODEL].sort(() => Math.random() - 0.5).slice(0, N);

        state.activeDiceData = elegidos.map((d, index) => {
            const letra = d.c[Math.floor(Math.random() * 6)];
            const info = getLetterInfo(letra);
            const div = document.createElement('div');
            div.className = `die c-${info.color}`;
            div.id = `die-${index}`;
            div.innerHTML = `${letra} <span class="val">${info.pts > 0 ? info.pts : ''}</span>`;
            div.onclick = () => selectDie(index);
            container.appendChild(div);
            return { original: letra, fijada: letra, pts: info.pts, color: info.color };
        });

        state.startTime = Date.now();
        clearInterval(state.timer);
        state.timer = setInterval(() => { document.getElementById('ui-timer').innerText = Math.floor((Date.now() - state.startTime) / 1000) + "s"; }, 1000);
        document.getElementById('btn-play').innerText = "¡LISTO!";
    }

    function selectDie(idx) {
        const die = state.activeDiceData[idx];
        if (die.fijada === '★') showStarSelector(idx);
        else addLetter(idx, die.fijada);
    }

    function showStarSelector(idx) {
        const selector = document.getElementById('star-selector');
        selector.innerHTML = "";
        selector.style.display = "grid";
        "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split('').forEach(l => {
            const b = document.createElement('div');
            b.className = "star-letter"; b.innerText = l;
            b.onclick = () => { 
                selector.style.display = "none"; 
                state.activeDiceData[idx].fijada = l;
                const el = document.getElementById(`die-${idx}`);
                el.innerHTML = `${l} <span class="val">★</span>`;
                el.className = "die comodin-fijado";
                addLetter(idx, l); 
            };
            selector.appendChild(b);
        });
    }

    function addLetter(diceIdx, letra) {
        state.wordStack.push({ diceIdx, letra });
        updateDisplay();
    }

    function deleteLast() {
        if (state.wordStack.length === 0) return;
        const last = state.wordStack.pop();
        const die = state.activeDiceData[last.diceIdx];
        if (die.original === '★') {
            const aunEnPalabra = state.wordStack.some(item => item.diceIdx === last.diceIdx);
            if (!aunEnPalabra) {
                die.fijada = '★';
                const el = document.getElementById(`die-${last.diceIdx}`);
                el.innerHTML = `★ <span class="val"></span>`;
                el.className = "die c-blanco";
            }
        }
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('display-word').innerText = state.wordStack.map(s => s.letra).join('');
    }

    function validateWord() {
        if (state.wordStack.length < 2) return;
        clearInterval(state.timer);
        const time = Math.floor((Date.now() - state.startTime) / 1000);
        
        let pVel = 0;
        if (time < 10) pVel = parseInt(document.getElementById('v-10').value);
        else if (time < 15) pVel = parseInt(document.getElementById('v-15').value);
        else if (time < 20) pVel = parseInt(document.getElementById('v-20').value);
        else if (time < 30) pVel = parseInt(document.getElementById('v-30').value);

        let pLetras = state.wordStack.reduce((sum, item) => sum + state.activeDiceData[item.diceIdx].pts, 0);
        
        const distinctDiceUsed = new Set(state.wordStack.map(item => item.diceIdx)).size;
        const N = parseInt(document.getElementById('cfg-n-dice').value);
        let pSex = (distinctDiceUsed === N) ? parseInt(document.getElementById('pts-sex').value) : 0;
        
        let pPab = (state.wordStack.length >= 10) ? parseInt(document.getElementById('pts-pab').value) : 0;

        const total = pVel + pLetras + pSex + pPab;
        state.score += total;

        const msg = document.getElementById('msg');
        msg.innerHTML = `🔥 +${total} PUNTOS <br><small>Letras: ${pLetras} | Tiempo: ${pVel} ${pSex ? '| SEXTUPLETE!' : ''}${pPab ? ' | PALABRÓN!' : ''}</small>`;
        msg.style.display = "block";
        
        document.getElementById('ui-score').innerText = state.score;
        state.round++;
        const btn = document.getElementById('btn-play');
        btn.innerText = (state.round > 6) ? "FIN" : "NUEVA RONDA";
        if (state.round > 6) btn.disabled = true;
        document.getElementById('ui-round').innerText = (state.round > 6 ? 6 : state.round) + "/6";
    }
</script>
</body>
</html>
