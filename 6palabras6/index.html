<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PALABROS - El Juego de Dados</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --primary: #f59e0b; --text-color: #f8fafc;
            --rojo: #ef4444; --azul: #3b82f6; --verde: #10b981; --morado: #a855f7; --blanco: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; touch-action: manipulation; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        
        header { width: 100%; padding: 15px; text-align: center; background: #1e293b; border-bottom: 3px solid var(--primary); }
        h1 { font-weight: 900; letter-spacing: 4px; font-size: 1.8rem; color: var(--primary); text-transform: uppercase; }

        #config-panel { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: var(--card-bg); z-index: 1000; padding: 20px; transition: 0.3s; }
        #config-panel.open { right: 0; }
        .config-btn { position: fixed; top: 15px; right: 15px; z-index: 1001; background: #1e293b; border: 1px solid var(--primary); border-radius: 50%; width: 45px; height: 45px; font-size: 20px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .stats { display: flex; justify-content: space-around; width: 95%; max-width: 500px; margin: 10px 0; background: var(--card-bg); padding: 10px; border-radius: 15px; }
        .stat-val { font-weight: 900; font-size: 1.2rem; display: block; color: var(--primary); }
        .stat-lbl { font-size: 9px; color: #94a3b8; text-transform: uppercase; }

        #game-area { width: 95%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; align-items: center; flex: 1; justify-content: center; }
        
        #display-word-container {
            width: 100%; position: relative; display: flex; align-items: center; gap: 10px;
        }
        #display-word {
            min-height: 70px; flex-grow: 1; background: #020617; border: 2px solid #334155;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: 900; color: var(--blanco); letter-spacing: 2px; text-transform: uppercase;
        }

        .dice-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
        
        @keyframes shake {
            0% { transform: rotate(0deg); } 25% { transform: rotate(5deg); } 50% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } 100% { transform: rotate(0deg); }
        }
        .shaking { animation: shake 0.3s ease-in-out; }

        .die {
            aspect-ratio: 1/1; border-radius: 18px; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; position: relative; box-shadow: 0 6px 0 rgba(0,0,0,0.4);
            cursor: pointer; user-select: none; transition: transform 0.1s;
        }
        .die:active { transform: scale(0.95) translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
        .die.comodin { color: #ff0000; }
        .die .val { position: absolute; bottom: 5px; right: 10px; font-size: 0.8rem; font-weight: 700; }

        .controls { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; width: 100%; margin-top: 10px; }
        .btn { padding: 18px; border: none; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 1rem; }
        .btn-del { background: #334155; color: white; }
        .btn-main { background: var(--primary); color: #000; box-shadow: 0 4px 0 #b45309; }

        #star-selector {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98);
            z-index: 2000; display: none; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; align-content: center;
        }
        .star-letter { background: var(--primary); color: #000; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-weight: 900; border-radius: 12px; font-size: 1.4rem; }

        #msg { padding: 12px; text-align: center; border-radius: 12px; width: 100%; display: none; font-weight: 700; }
        .success { background: #10b981; color: white; display: block !important; }

        .c-rojo { background: var(--rojo); color: white; }
        .c-azul { background: var(--azul); color: white; }
        .c-verde { background: var(--verde); color: white; }
        .c-morado { background: var(--morado); color: white; }
        .c-blanco { background: var(--blanco); color: #1e293b; }
    </style>
</head>
<body>

<button class="config-btn" onclick="document.getElementById('config-panel').classList.toggle('open')">âïž</button>

<div id="config-panel">
    <h2 style="color:var(--primary); margin-bottom:15px">AJUSTES</h2>
    <div class="input-group"><label>Dados por Tirada (N)</label><input type="number" id="cfg-n-dice" value="6" min="1" max="11"></div>
    <div class="input-group"><label>Bono Sextuplete</label><input type="number" id="pts-sex" value="20"></div>
    <div class="input-group"><label>Bono PalabrĂłn (10+)</label><input type="number" id="pts-pab" value="10"></div>
    <button class="btn btn-main" style="width:100%" onclick="document.getElementById('config-panel').classList.remove('open')">ACEPTAR</button>
</div>

<header><h1>PALABROS</h1></header>

<div class="stats">
    <div class="stat-box"><span class="stat-lbl">Ronda</span><span id="ui-round" class="stat-val">1/6</span></div>
    <div class="stat-box"><span class="stat-lbl">Puntos</span><span id="ui-score" class="stat-val">0</span></div>
    <div class="stat-box"><span class="stat-lbl">Reloj</span><span id="ui-timer" class="stat-val">0s</span></div>
</div>

<main id="game-area">
    <div id="display-word-container">
        <div id="display-word"></div>
    </div>
    <div id="msg"></div>
    <div id="dice-container" class="dice-grid"></div>
    
    <div class="controls">
        <button class="btn btn-del" onclick="deleteLast()">Borrar</button>
        <button id="btn-play" class="btn btn-main" onclick="handleAction()">Lanzar Dados</button>
    </div>
</main>

<div id="star-selector"></div>

<script>
    const DADOS_MODEL = [
        {c:['A','E','O','R','S','â']}, {c:['A','E','O','R','S','â']}, {c:['A','E','O','R','S','â']},
        {c:['A','E','O','L','D','â']}, {c:['A','E','O','L','D','â']}, {c:['A','E','I','N','T','â']},
        {c:['I','N','T','C','B','â']}, {c:['I','N','T','C','B','â']}, {c:['I','L','D','C','M','â']},
        {c:['U','P','M','F','G','â']}, {c:['U','P','H','J','Ă','â']}, {c:['U','U','V','Q','Z','â']}
    ];

    let state = {
        score: 0, round: 1, phase: 1, bolsa: [], usadosAnterior: [], activeDiceData: [], wordStack: [], startTime: 0, timer: null
    };

    function getLetterInfo(l) {
        if (l === 'â') return { color: 'blanco', pts: 0 };
        if ("AEORS".includes(l)) return { color: 'rojo', pts: 1 };
        if ("ILNDT".includes(l)) return { color: 'azul', pts: 2 };
        if ("CBMP".includes(l)) return { color: 'verde', pts: 3 };
        if ("UFGHJĂVQZU".includes(l)) return { color: 'morado', pts: 5 };
        return { color: 'blanco', pts: 0 };
    }

    function handleAction() {
        const btn = document.getElementById('btn-play');
        if (btn.innerText.includes("LANZAR") || btn.innerText.includes("RONDA") || btn.innerText.includes("NUEVA")) startRound();
        else validateWord();
    }

    function startRound() {
        const N = parseInt(document.getElementById('cfg-n-dice').value);
        const container = document.getElementById('dice-container');
        container.innerHTML = "";
        container.classList.add('shaking');
        setTimeout(() => container.classList.remove('shaking'), 300);
        
        document.getElementById('display-word').innerText = "";
        document.getElementById('msg').style.display = "none";
        state.wordStack = [];

        let elegidos = [];
        if (state.phase === 1) {
            let mezclada = [...DADOS_MODEL].sort(() => Math.random() - 0.5);
            elegidos = mezclada.slice(0, N);
            state.bolsa = mezclada.slice(N);
            state.usadosAnterior = elegidos;
        } else {
            elegidos = [...state.bolsa];
            if (elegidos.length < N) {
                const faltan = N - elegidos.length;
                const relleno = [...state.usadosAnterior].sort(() => Math.random() - 0.5).slice(0, faltan);
                elegidos = elegidos.concat(relleno);
            }
        }

        state.activeDiceData = elegidos.map((d, index) => {
            const letra = d.c[Math.floor(Math.random() * 6)];
            const info = getLetterInfo(letra);
            const div = document.createElement('div');
            div.className = `die c-${info.color} ${letra === 'â' ? 'comodin' : ''}`;
            div.id = `die-${index}`;
            div.innerHTML = `${letra} <span class="val">${info.pts > 0 ? info.pts : ''}</span>`;
            div.onclick = () => selectDie(index);
            container.appendChild(div);
            return { original: letra, pts: info.pts };
        });

        state.startTime = Date.now();
        clearInterval(state.timer);
        state.timer = setInterval(() => {
            document.getElementById('ui-timer').innerText = Math.floor((Date.now() - state.startTime) / 1000) + "s";
        }, 1000);
        document.getElementById('btn-play').innerText = "ÂĄLISTO!";
    }

    function selectDie(idx) {
        if (state.activeDiceData[idx].original === 'â') {
            showStarSelector(idx);
        } else {
            addLetter(idx, state.activeDiceData[idx].original);
        }
    }

    function showStarSelector(idx) {
        const selector = document.getElementById('star-selector');
        selector.innerHTML = "";
        selector.style.display = "grid";
        "ABCDEFGHIJKLMNĂOPQRSTUVWXYZ".split('').forEach(l => {
            const b = document.createElement('div');
            b.className = "star-letter";
            b.innerText = l;
            b.onclick = () => { selector.style.display = "none"; addLetter(idx, l); };
            selector.appendChild(b);
        });
    }

    function addLetter(diceIdx, letraElegida) {
        state.wordStack.push({ diceIdx, letraElegida });
        updateDisplay();
    }

    function deleteLast() {
        state.wordStack.pop();
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('display-word').innerText = state.wordStack.map(s => s.letraElegida).join('');
    }

    function validateWord() {
        if (state.wordStack.length < 2) return;
        clearInterval(state.timer);
        const time = Math.floor((Date.now() - state.startTime) / 1000);
        
        let pVel = (time < 10) ? 10 : (time < 15 ? 5 : (time < 20 ? 2 : 0));
        
        // Sumamos los puntos de cada letra segĂșn el dado del que vino
        let pLetras = state.wordStack.reduce((sum, item) => sum + state.activeDiceData[item.diceIdx].pts, 0);
        
        // Sextuplete: ÂżCuĂĄntos dados DISTINTOS se han usado?
        const distinctDiceUsed = new Set(state.wordStack.map(item => item.diceIdx)).size;
        const N = parseInt(document.getElementById('cfg-n-dice').value);
        let pSex = (distinctDiceUsed === N) ? parseInt(document.getElementById('pts-sex').value) : 0;
        
        // Bono PalabrĂłn (Longitud de la palabra)
        let pPab = (state.wordStack.length >= 10) ? parseInt(document.getElementById('pts-pab').value) : 0;

        const total = pVel + pLetras + pSex + pPab;
        state.score += total;

        const msg = document.getElementById('msg');
        msg.innerHTML = `đ„ +${total} PUNTOS <br><small>Letras: ${pLetras} | Tiempo: ${pVel} ${pSex ? '| SEXTUPLETE!' : ''}</small>`;
        msg.className = "success";
        
        document.getElementById('ui-score').innerText = state.score;
        const btn = document.getElementById('btn-play');

        if (state.phase === 1) {
            state.phase = 2;
            btn.innerText = "SIGUIENTE RONDA";
        } else {
            state.phase = 1;
            state.round++;
            btn.innerText = (state.round > 6) ? "FIN" : "NUEVA PALABRA";
            if (state.round > 6) btn.disabled = true;
        }
        document.getElementById('ui-round').innerText = (state.round > 6 ? 6 : state.round) + "/6";
    }
</script>
</body>
</html>
