<script>
    const DADOS = [
        {c:['A','E','O','R','S','★']}, {c:['A','E','O','R','S','★']}, {c:['A','E','O','R','S','★']},
        {c:['A','E','O','L','D','★']}, {c:['A','E','O','L','D','★']}, {c:['A','E','I','N','T','★']},
        {c:['I','N','T','C','B','★']}, {c:['I','N','T','C','B','★']}, {c:['I','L','D','C','M','★']},
        {c:['U','P','M','F','G','★']}, {c:['U','P','H','J','Ñ','★']}, {c:['U','U','V','Q','Z','★']}
    ];

    let state = { score: 0, round: 1, phase: 1, pool: [], activeDice: [], startTime: 0, timer: null, diccionario: new Set() };

    // CARGAR DICCIONARIO (Usamos un repositorio de palabras comunes en español)
    async function cargarDiccionario() {
        try {
            const resp = await fetch('https://raw.githubusercontent.com/pjnovas/spanish-words/master/listado-general.txt');
            const texto = await resp.text();
            // Limpiamos acentos para que sea más fácil jugar con dados
            const palabras = texto.split('\n').map(p => 
                p.trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            );
            state.diccionario = new Set(palabras);
            console.log("Diccionario cargado: " + state.diccionario.size + " palabras.");
        } catch (e) {
            console.error("Error cargando diccionario, se permitirá jugar sin validación RAE.");
        }
    }
    cargarDiccionario();

    function getLetterData(l) {
        if (l === '★') return { c: 'blanco', p: 0 };
        if ("AEORS".includes(l)) return { c: 'rojo', p: parseInt(document.getElementById('p-rojo').value) };
        if ("ILNDT".includes(l)) return { c: 'azul', p: parseInt(document.getElementById('p-azul').value) };
        if ("CBMP".includes(l)) return { c: 'verde', p: parseInt(document.getElementById('p-verde').value) };
        if ("UFGHJÑVQZU".includes(l)) return { c: 'morado', p: parseInt(document.getElementById('p-mora').value) };
        return { c: 'blanco', p: 0 };
    }

    function logic() {
        const btn = document.getElementById('btn-play');
        if (btn.innerText.includes("LANZAR") || btn.innerText.includes("SIGUIENTE") || btn.innerText.includes("NUEVA")) {
            startRound();
        } else {
            validateWord();
        }
    }

    function startRound() {
        const container = document.getElementById('dice-container');
        container.innerHTML = "";
        const msg = document.getElementById('msg');
        msg.style.display = "none";
        msg.className = "";
        document.getElementById('word-input').value = "";
        document.getElementById('word-input').disabled = false;
        document.getElementById('word-input').focus();

        if (state.phase === 1) {
            state.pool = [...DADOS].sort(() => Math.random() - 0.5);
            state.activeDice = state.pool.slice(0, 6).map(d => d.c[Math.floor(Math.random()*6)]);
        } else {
            state.activeDice = state.pool.slice(6).map(d => d.c[Math.floor(Math.random()*6)]);
        }

        const isWhite = document.getElementById('cfg-style').value === 'blanco';
        state.activeDice.forEach(l => {
            const data = getLetterData(l);
            const div = document.createElement('div');
            div.className = `die ${isWhite ? 'c-blanco' : 'c-'+data.c} ${l==='★'?'comodin':''}`;
            div.innerHTML = `${l} <span class="val">${data.p > 0 ? data.p : ''}</span>`;
            container.appendChild(div);
        });

        state.startTime = Date.now();
        state.timer = setInterval(() => {
            document.getElementById('ui-timer').innerText = Math.floor((Date.now()-state.startTime)/1000) + "s";
        }, 1000);
        
        document.getElementById('btn-play').innerText = "¡VALIDAR PALABRA!";
    }

    function validateWord() {
        let word = document.getElementById('word-input').value.toUpperCase().trim();
        word = word.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); // Quitar acentos para comparar
        
        const msg = document.getElementById('msg');

        // 1. COMPROBAR RAE (Diccionario)
        if (state.diccionario.size > 0 && !state.diccionario.has(word)) {
            msg.innerText = "❌ Esa palabra no está en el diccionario.";
            msg.className = "error";
            return;
        }

        // 2. COMPROBAR DADOS Y COMODINES
        let available = [...state.activeDice];
        let basicLetters = available.filter(x => x !== '★');
        let comodinesCount = available.filter(x => x === '★').length;
        
        let wordLetters = word.split('');
        let usedDiceIndices = new Set();
        let neededFromComodines = new Set();

        // Identificar qué letras de la palabra no están en los dados
        wordLetters.forEach(char => {
            if (basicLetters.includes(char)) {
                let idx = available.indexOf(char);
                usedDiceIndices.add(idx);
            } else {
                neededFromComodines.add(char);
            }
        });

        if (neededFromComodines.size > comodinesCount) {
            msg.innerText = `❌ No tienes suficientes comodines para las letras extra.`;
            msg.className = "error";
            return;
        }

        // Marcar los dados de comodín como usados
        let usedComodines = 0;
        available.forEach((l, i) => {
            if (l === '★' && usedComodines < neededFromComodines.size) {
                usedDiceIndices.add(i);
                usedComodines++;
            }
        });

        // 3. CÁLCULO DE PUNTOS
        clearInterval(state.timer);
        let time = Math.floor((Date.now() - state.startTime)/1000);
        
        let pVel = (time < 10) ? parseInt(document.getElementById('pts-v1').value) : (time < 15 ? 5 : (time < 25 ? 2 : 0));
        let pLetras = wordLetters.reduce((acc, l) => acc + (basicLetters.includes(l) ? getLetterData(l).p : 0), 0);
        let pPab = (word.length >= 10) ? parseInt(document.getElementById('pts-pab').value) : 0;
        let pSex = (usedDiceIndices.size === 6) ? parseInt(document.getElementById('pts-sex').value) : 0;

        let total = pVel + pLetras + pPab + pSex;
        state.score += total;

        // FEEDBACK
        msg.innerHTML = `✅ PALABRA VÁLIDA: +${total} pts <br> <small>(Vel: ${pVel}, Letras: ${pLetras}${pSex?', SEXTUPLETE!':''})</small>`;
        msg.className = "success";
        document.getElementById('ui-score').innerText = state.score;
        document.getElementById('word-input').disabled = true;

        const btn = document.getElementById('btn-play');
        if (state.phase === 1) {
            state.phase = 2;
            btn.innerText = "SIGUIENTE RONDA (6 SOBRANTES)";
        } else {
            state.phase = 1;
            state.round++;
            btn.innerText = (state.round > 6) ? "FIN DE PARTIDA" : "NUEVA PALABRA (BOLSA)";
            if (state.round > 6) btn.disabled = true;
        }
        document.getElementById('ui-round').innerText = (state.round > 6 ? 6 : state.round) + "/6";
    }
</script>
